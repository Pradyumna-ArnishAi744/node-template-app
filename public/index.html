<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Template Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="mb-4">Upload Template</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Template Name</label>
        <input type="text" class="form-control" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Upload Document (.docx)</label>
        <input type="file" class="form-control" name="document" accept=".docx" required>
      </div>
      <button type="submit" class="btn btn-primary">Upload</button>
    </form>

    <div id="response" class="mt-3"></div>
  </div>
</div>

<script>
  document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    try {
      const res = await fetch("/api/templates", {
        method: "POST",
        body: formData
      });
      const data = await res.json();

      document.getElementById("response").innerHTML =
        `<div class="alert alert-success">Uploaded Successfully! <br>ID: ${data.id}</div>`;
    } catch (err) {
      document.getElementById("response").innerHTML =
        `<div class="alert alert-danger">Error: ${err.message}</div>`;
    }
  });
</script>
</body>
</html>
